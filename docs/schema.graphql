  inquiryVoteCast(inquiryId: ID!): JSON!
  inquiryEvaluated(inquiryId: ID!): JSON!
  cursorMoved(graphId: ID!): CursorPosition!
  presenceChanged(graphId: ID!): UserPresence!
  nodeSelected(graphId: ID!): NodeSelection!
  typingIndicator(nodeId: ID!): TypingIndicator!
  editLockChanged(graphId: ID!): EditLock!
  mediaProcessingJobUpdates(jobId: String!): MediaProcessingJob!
  mediaFileJobUpdates(fileId: String!): MediaProcessingJob!
}

type CursorPosition {
  userId: ID!
  userName: String!
  userAvatar: String
  graphId: ID!
  x: Float!
  y: Float!
  timestamp: DateTimeISO!
}

type NodeSelection {
  userId: ID!
  userName: String!
  graphId: ID!
  nodeIds: [ID!]!
  timestamp: DateTimeISO!
}

type TypingIndicator {
  userId: ID!
  userName: String!
  nodeId: ID!
  isTyping: Boolean!
  timestamp: DateTimeISO!
}