  createEdgeWithDetails(input: CreateEdgeWithDetailsInput!): Edge!
  deleteNode(nodeId: ID!): Boolean!
  createStickyNote(input: CreateStickyNoteInput!): ActivityPost!
  updateStickyNoteStyle(input: UpdateStickyNoteStyleInput!): ActivityPost!
  addReaction(input: AddReactionInput!): Boolean!
  updateCursor(input: UpdateCursorInput!): Boolean!
  updatePresence(input: UpdatePresenceInput!): Boolean!
